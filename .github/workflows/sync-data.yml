name: Sync Data from Feishu
on:
  schedule:
    - cron: '0 8,18 * * *'   # 每天8点和18点触发
  workflow_dispatch:          # 也支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Sync and Generate
        env:
          BASE_TOKEN: ${{ secrets.BASE_TOKEN }}
        run: |
          # Install lark-cli
          npm install -g @lark-opendev/lark-cli 2>/dev/null || true
          
          # Extract fresh data from Feishu (new view: vewpI8lyYw)
          # Fetch main tasks
          lark-cli base +record-list --base-token "$BASE_TOKEN" --table-id tblCQ1JwLliZON3a --view-id vewpI8lyYw --offset 0 --limit 200 --as user --format json > /tmp/records.json 2>/dev/null
          
          # Fetch people table
          lark-cli base +record-list --base-token "$BASE_TOKEN" --table-id tblZ7AiIKPFRZuiR --offset 0 --limit 200 --as user --format json > /tmp/people.json 2>/dev/null
          
          # Generate HTML
          python3 generate_html.py
      - name: Commit and Push
        run: |
          git config user.name "rox-sync-bot"
          git config user.email "bot@rox-schedule"
          git add index.html
          git diff --staged --quiet || (git commit -m "auto: sync Feishu data" && git push)