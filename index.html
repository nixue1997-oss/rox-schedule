<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROX开发阶段项目排期</title>
<style>
:root {
  --primary: #3370FF;
  --primary-light: #5890FF;
  --primary-dark: #2858CC;
  --primary-bg: #F0F5FF;
  --success: #34C759;
  --warning: #FF9500;
  --danger: #FF3B30;
  --gray-1: #F7F8FA;
  --gray-2: #F2F3F5;
  --gray-3: #E5E6EB;
  --gray-4: #C9CDD4;
  --gray-5: #86909C;
  --gray-6: #4E5969;
  --gray-7: #1D2129;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
  --font: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  --transition: all 0.25s ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: var(--gray-1);
  color: var(--gray-7);
  line-height: 1.6;
  min-height: 100vh;
}
/* Header */
.header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  padding: 20px 32px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(51,112,255,0.3);
}
.header-inner {
  max-width: 1440px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.header h1 span {
  font-weight: 300;
  opacity: 0.85;
  font-size: 14px;
  margin-left: 12px;
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}
/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font);
  cursor: pointer;
  transition: var(--transition);
  font-weight: 500;
}
.btn-primary {
  background: #fff;
  color: var(--primary);
}
.btn-primary:hover {
  background: var(--primary-bg);
  transform: translateY(-1px);
}
.btn-outline {
  background: transparent;
  color: #fff;
  border: 1.5px solid rgba(255,255,255,0.5);
}
.btn-outline:hover {
  background: rgba(255,255,255,0.15);
  border-color: #fff;
}
.btn-small {
  padding: 5px 12px;
  font-size: 12px;
}
.btn-text {
  background: none;
  border: none;
  color: var(--gray-6);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 13px;
}
.btn-text:hover { background: var(--gray-2); }
.btn-admin {
  background: rgba(255,255,255,0.2);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
}
.btn-admin:hover {
  background: rgba(255,255,255,0.3);
}
.btn-danger {
  background: var(--danger);
  color: #fff;
}
.btn-danger:hover { background: #d62d20; }

/* Container */
.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: 20px 24px;
}

/* Stats Cards */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: #fff;
  border-radius: var(--radius-md);
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-3);
  transition: var(--transition);
}
.stat-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.stat-card .label {
  font-size: 13px;
  color: var(--gray-5);
  margin-bottom: 6px;
}
.stat-card .value {
  font-size: 28px;
  font-weight: 700;
  color: var(--gray-7);
}
.stat-card .value.primary { color: var(--primary); }
.stat-card .value.success { color: var(--success); }
.stat-card .value.warning { color: var(--warning); }
.stat-card .value.danger { color: var(--danger); }

/* Filter Bar */
.filter-bar {
  background: #fff;
  border-radius: var(--radius-md);
  padding: 16px 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-3);
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}
.filter-bar label {
  font-size: 13px;
  color: var(--gray-6);
  font-weight: 500;
  margin-right: 4px;
}
.filter-bar select, .filter-bar input {
  padding: 6px 12px;
  border: 1px solid var(--gray-3);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: var(--font);
  background: #fff;
  color: var(--gray-7);
  outline: none;
  transition: var(--transition);
}
.filter-bar select:focus, .filter-bar input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(51,112,255,0.15);
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-bar .result-count {
  margin-left: auto;
  font-size: 13px;
  color: var(--gray-5);
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  background: var(--gray-2);
  border-radius: var(--radius-sm);
  padding: 3px;
  margin-bottom: 20px;
}
.tab {
  padding: 8px 24px;
  border: none;
  background: transparent;
  font-size: 14px;
  font-family: var(--font);
  cursor: pointer;
  border-radius: 4px;
  color: var(--gray-6);
  transition: var(--transition);
  font-weight: 500;
}
.tab.active {
  background: #fff;
  color: var(--primary);
  box-shadow: var(--shadow-sm);
}
.tab:hover:not(.active) {
  color: var(--gray-7);
}

/* Table */
.table-wrapper {
  background: #fff;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-3);
  overflow: hidden;
  margin-bottom: 20px;
}
.table-scroll {
  overflow-x: auto;
  max-height: 65vh;
  overflow-y: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  white-space: nowrap;
}
thead {
  position: sticky;
  top: 0;
  z-index: 5;
}
th {
  background: var(--gray-1);
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  color: var(--gray-6);
  border-bottom: 2px solid var(--gray-3);
  cursor: pointer;
  user-select: none;
  position: relative;
}
th:hover {
  background: var(--gray-2);
}
th .sort-icon {
  display: inline-block;
  width: 0;
  height: 0;
  margin-left: 4px;
  vertical-align: middle;
  border-left: 4px solid transparent;
  border-right: 4px solid transparent;
}
th .sort-icon.asc {
  border-bottom: 5px solid var(--primary);
}
th .sort-icon.desc {
  border-top: 5px solid var(--primary);
}
td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--gray-3);
  color: var(--gray-7);
}
tr:hover td {
  background: var(--primary-bg);
}
tr:last-child td {
  border-bottom: none;
}
/* Status badges */
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}
.badge-progress { background: #E8F5E9; color: #2E7D32; }
.badge-pending { background: #FFF8E1; color: #F57F17; }
.badge-review { background: #E3F2FD; color: #1565C0; }
.badge-region {
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
  background: var(--gray-2);
  color: var(--gray-6);
  margin-right: 2px;
}

/* Gantt Chart */
.gantt-section {
  margin-bottom: 20px;
}
.gantt-wrapper {
  background: #fff;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-3);
  padding: 0;
  overflow: hidden;
}
.gantt-header-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--gray-3);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.gantt-header-section h3 {
  font-size: 16px;
  font-weight: 600;
}
.gantt-scroll {
  overflow-x: auto;
  overflow-y: auto;
  max-height: 600px;
}
.gantt-container {
  position: relative;
  min-width: 100%;
}
/* Gantt rows */
.gantt-row {
  display: flex;
  border-bottom: 1px solid var(--gray-3);
  min-height: 36px;
}
.gantt-row:hover {
  background: rgba(51,112,255,0.03);
}
.gantt-row-label {
  flex: 0 0 220px;
  min-width: 220px;
  padding: 6px 16px;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-right: 1px solid var(--gray-3);
  background: #fff;
  position: sticky;
  left: 0;
  z-index: 2;
  overflow: hidden;
  text-overflow: ellipsis;
}
.gantt-row-label .person-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.gantt-row-bars {
  flex: 1;
  position: relative;
  min-height: 36px;
}
.gantt-week-labels {
  display: flex;
  border-bottom: 1px solid var(--gray-3);
  position: sticky;
  top: 0;
  z-index: 3;
  background: var(--gray-1);
}
.gantt-week-label {
  flex: 0 0 80px;
  min-width: 80px;
  padding: 6px 4px;
  text-align: center;
  font-size: 11px;
  color: var(--gray-5);
  border-right: 1px solid var(--gray-3);
}
.gantt-week-label.weekend {
  color: var(--danger);
  background: rgba(255,59,48,0.03);
}
.gantt-week-label .week-range {
  display: block;
  font-size: 10px;
  color: var(--gray-4);
  margin-top: 1px;
}
.gantt-week-label.today {
  background: rgba(51,112,255,0.08);
  color: var(--primary);
  font-weight: 600;
}
/* Gantt bar */
.gantt-bar {
  position: absolute;
  height: 24px;
  border-radius: 4px;
  top: 6px;
  cursor: pointer;
  transition: var(--transition);
  z-index: 1;
  opacity: 0.85;
  min-width: 4px;
}
.gantt-bar:hover {
  opacity: 1;
  transform: scaleY(1.1);
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.gantt-bar .bar-label {
  padding: 0 6px;
  font-size: 10px;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 24px;
  font-weight: 500;
}
/* Milestone markers */
.gantt-milestone {
  position: absolute;
  width: 2px;
  top: 0;
  bottom: 0;
  z-index: 5;
  pointer-events: none;
}
.gantt-milestone::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 2px solid;
  background: #fff;
}
.gantt-milestone.milestone-version::before {
  border-color: var(--primary);
}
.gantt-milestone.milestone-online::before {
  border-color: var(--success);
}
.gantt-milestone .milestone-label {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  white-space: nowrap;
  padding: 1px 4px;
  border-radius: 3px;
  background: rgba(255,255,255,0.9);
}
.gantt-milestone.milestone-version .milestone-label {
  color: var(--primary);
}
.gantt-milestone.milestone-online .milestone-label {
  color: var(--success);
}
/* Gantt grid lines */
.gantt-grid-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--gray-3);
  z-index: 0;
  pointer-events: none;
}
.gantt-grid-line.month-line {
  background: var(--gray-4);
}

/* Tooltip */
.gantt-tooltip {
  position: fixed;
  background: var(--gray-7);
  color: #fff;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  line-height: 1.6;
  z-index: 1000;
  max-width: 360px;
  pointer-events: none;
  box-shadow: var(--shadow-lg);
  display: none;
}
.gantt-tooltip .tt-title {
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 4px;
}
.gantt-tooltip .tt-row {
  display: flex;
  justify-content: space-between;
  gap: 16px;
}
.gantt-tooltip .tt-label {
  color: var(--gray-4);
}

/* Modal */
.modal-overlay {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.show {
  display: flex;
}
.modal {
  background: #fff;
  border-radius: var(--radius-lg);
  width: 90%;
  max-width: 540px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.25s ease;
}
@keyframes modalIn {
  from { opacity:0; transform: scale(0.95) translateY(10px); }
  to { opacity:1; transform: scale(1) translateY(0); }
}
.modal-header {
  padding: 18px 24px;
  border-bottom: 1px solid var(--gray-3);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-header h3 {
  font-size: 17px;
  font-weight: 600;
}
.modal-close {
  width: 32px; height: 32px;
  border: none;
  background: var(--gray-2);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--gray-5);
  transition: var(--transition);
}
.modal-close:hover {
  background: var(--gray-3);
  color: var(--gray-7);
}
.modal-body {
  padding: 20px 24px;
}
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--gray-3);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* Form */
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-6);
  margin-bottom: 5px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--gray-3);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font);
  outline: none;
  transition: var(--transition);
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(51,112,255,0.12);
}
.form-group textarea {
  resize: vertical;
  min-height: 60px;
}

/* Password input */
.password-input-wrap {
  position: relative;
}
.password-input-wrap input {
  padding-right: 40px;
}
.password-toggle {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--gray-5);
  font-size: 16px;
}

/* Admin badge */
.admin-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.2);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  color: #fff;
}

/* Toast */
.toast-container {
  position: fixed;
  top: 80px;
  right: 24px;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--gray-7);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.3s ease;
  max-width: 380px;
}
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.warning { background: var(--warning); }
@keyframes toastIn {
  from { opacity:0; transform: translateX(20px); }
  to { opacity:1; transform: translateX(0); }
}

/* No data */
.no-data {
  text-align: center;
  padding: 48px 20px;
  color: var(--gray-5);
  font-size: 14px;
}

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 14px 16px; }
  .header h1 { font-size: 17px; }
  .header h1 span { display: none; }
  .container { padding: 12px 12px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-card { padding: 12px 14px; }
  .stat-card .value { font-size: 22px; }
  .filter-bar { flex-direction: column; align-items: stretch; }
  .filter-bar .result-count { margin-left: 0; }
  .filter-group { flex-wrap: wrap; }
  .gantt-row-label { flex: 0 0 140px; min-width: 140px; font-size: 11px; }
  .tabs { overflow-x: auto; }
  .modal { width: 95%; }
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gray-5); }

/* Priority badges */
.priority-p0 { border-left: 3px solid var(--danger); }
.priority-p2 { border-left: 3px solid var(--warning); }

/* Legend */
.gantt-legend {
  padding: 10px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  border-top: 1px solid var(--gray-3);
  font-size: 12px;
}
.gantt-legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
}
.gantt-legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <h1>ROX 开发排期 <span>ROX开发阶段项目排期 · 2026.4~</span></h1>
    <div class="header-actions">
      <div id="adminStatus"></div>
      <button class="btn btn-admin" onclick="openAdminPanel()">管理员</button>
      <button class="btn btn-outline btn-small" onclick="refreshView()">刷新</button>
    </div>
  </div>
</header>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<!-- Gantt tooltip -->
<div class="gantt-tooltip" id="ganttTooltip"></div>

<!-- Container -->
<div class="container">

  <!-- Stats -->
  <div class="stats-row" id="statsRow"></div>

  <!-- Tabs -->
  <div class="tabs" id="viewTabs">
    <button class="tab active" data-view="all">全部视图</button>
    <button class="tab" data-view="gantt">甘特图</button>
    <button class="tab" data-view="table">数据表格</button>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>地区</label>
      <select id="filterRegion" onchange="applyFilters()">
        <option value="">全部地区</option>
        <option value="日服">日服</option>
        <option value="国服">国服</option>
        <option value="美服">美服</option>
        <option value="欧服">欧服</option>
      </select>
    </div>
    <div class="filter-group">
      <label>状态</label>
      <select id="filterStatus" onchange="applyFilters()">
        <option value="">全部状态</option>
        <option value="进行中">进行中</option>
        <option value="未启动">未启动</option>
        <option value="QA验收中">QA验收中</option>
      </select>
    </div>
    <div class="filter-group">
      <label>执行人</label>
      <select id="filterPerson" onchange="applyFilters()">
        <option value="">全部人员</option>
      </select>
    </div>
    <div class="result-count" id="resultCount"></div>
  </div>

  <!-- View Container -->
  <div id="viewContainer"></div>

</div>

<!-- Admin Login Modal -->
<div class="modal-overlay" id="adminLoginModal">
  <div class="modal">
    <div class="modal-header">
      <h3>管理员登录</h3>
      <button class="modal-close" onclick="closeModal('adminLoginModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>管理员口令</label>
        <div class="password-input-wrap">
          <input type="password" id="adminPassword" placeholder="请输入管理员口令" onkeydown="if(event.key==='Enter')adminLogin()">
          <button class="password-toggle" onclick="togglePassword('adminPassword')">&#128065;</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-text" onclick="closeModal('adminLoginModal')">取消</button>
      <button class="btn btn-primary" onclick="adminLogin()" style="background:var(--primary);color:#fff;">登录</button>
    </div>
  </div>
</div>

<script>
// ======================== DATA ========================
var DATA = null; // Will be populated below
var APP_DATA = null; // Simplified version

// Global State

  isAdmin: false,
  currentView: 'all',
  filterRegion: '',
  filterStatus: '',
  filterPerson: '',
  sortBy: null,
  sortDir: 'asc',
  adminPassword: 'ROX_ADMIN_2026'
};

// Color palette for assignees
var COLORS = [
  '#3370FF', '#34C759', '#FF9500', '#FF3B30', '#AF52DE',
  '#5AC8FA', '#FFD60A', '#32D74B', '#BF5AF2', '#FF6482',
  '#6C8EBF', '#82C785', '#E8A838', '#E86850', '#9B59B6',
  '#1ABC9C', '#F39C12', '#E74C3C', '#3498DB', '#2ECC71',
  '#E67E22', '#9B59B6', '#1ABC9C', '#34495E', '#7F8C8D',
  '#2980B9', '#27AE60', '#D35400', '#C0392B', '#8E44AD'

// ======================== DATA LOADING ========================
function loadData() {
  APP_DATA = DATA;
  populatePersonFilter();
  renderStats();
  renderView();
}

function getAllPeople() {
  var map = {};
  APP_DATA.records.forEach(function(r) {
    r.assignee.forEach(function(a) {
      map[a.id] = a.name;
    });
  });
  APP_DATA.people.forEach(function(p) {
    map[p.id] = p.name;
  });
  var result = [];
  for (var id in map) {
    result.push({ id: id, name: map[id] });
  }
  result.sort(function(a,b) { return a.name.localeCompare(b.name, 'zh'); });
  return result;
}

function getPersonColor(name) {
  var index = 0;
  var all = getAllPeople();
  for (var i = 0; i < all.length; i++) {
    if (all[i].name === name) { index = i; break; }
  }
  return COLORS[index % COLORS.length];
}

function populatePersonFilter() {
  var sel = document.getElementById('filterPerson');
  var people = getAllPeople();
  people.forEach(function(p) {
    var opt = document.createElement('option');
    opt.value = p.name;
    opt.textContent = p.name;

}

// ======================== TOAST ========================

  container.appendChild(t);

}

// ======================== MODALS ========================
function openModal(id) {

}
function closeModal(id) {

}

// ======================== ADMIN ========================

    STATE.isAdmin = true;

}

function adminLogout() {

}

    el.innerHTML = '<span class="admin-badge">&#128274; 管理员模式</span>';

// ======================== TASK FORM ========================
function populateTaskForm() {
  var sel = document.getElementById('taskPerson');
  sel.innerHTML = '';
  var people = getAllPeople();
  people.forEach(function(p) {
    var opt = document.createElement('option');
    opt.value = p.name;
    opt.textContent = p.name;
    sel.appendChild(opt);
  });
  // Set default deadline to 14 days from now
  var d = new Date();
  d.setDate(d.getDate() + 14);
  document.getElementById('taskDeadline').value = formatDate(d);
  document.getElementById('taskName').value = '';
  document.getElementById('taskDesc').value = '';
  document.getElementById('taskDuration').value = 3;
  document.getElementById('autoScheduleResult').style.display = 'none';
}

function formatDate(d) {
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function parseDate(s) {
  if (!s) return null;
  var parts = s.split('-');
  if (parts.length === 3) {
    return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  }
  // Try YYYY/MM/DD
  parts = s.split('/');
  if (parts.length === 3) {
    return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  }
  return null;
}

// ======================== AUTO SCHEDULING ALGORITHM ========================
function calculateAutoSchedule(personName, durationDays, deadlineStr, priority) {
  // Get all existing tasks for this person that have start/end dates
  var personTasks = APP_DATA.records.filter(function(r) {
    return r.assignee.some(function(a) { return a.name === personName; }) &&
           r.startDate && r.endDate;
  });

  // Build occupied intervals
  var occupied = personTasks.map(function(r) {
    return { start: parseDate(r.startDate), end: parseDate(r.endDate) };
  }).filter(function(o) { return o.start && o.end; });

  // Sort by start date
  occupied.sort(function(a,b) { return a.start - b.start; });

  // Find free slots
  var today = new Date();
  today.setHours(0,0,0,0);

  // P0: start as early as possible
  // P2: start after today + 1 day
  var earliestStart = new Date(today);
  if (priority === 'P2') {
    earliestStart.setDate(earliestStart.getDate() + 1);
  }

  var deadline = parseDate(deadlineStr);
  if (!deadline) {
    deadline = new Date(today);
    deadline.setDate(deadline.getDate() + 30);
  }

  // Try to find a free slot
  var suggestedStart = null;
  var suggestedEnd = null;

  // Check gaps between occupied tasks
  var cursor = new Date(earliestStart);

  // If no occupied tasks, use earliest start
  if (occupied.length === 0) {
    suggestedStart = new Date(cursor);
    suggestedEnd = new Date(suggestedStart);
    suggestedEnd.setDate(suggestedEnd.getDate() + Math.ceil(durationDays) - 1);
    if (suggestedEnd > deadline) {
      suggestedEnd = new Date(deadline);
    }
    return { start: suggestedStart, end: suggestedEnd, gapFound: true };
  }

  // Check before first task
  var firstStart = occupied[0].start;
  var gapDays = Math.floor((firstStart - cursor) / (1000*60*60*24));
  if (gapDays >= durationDays) {
    suggestedStart = new Date(cursor);
    suggestedEnd = new Date(suggestedStart);
    suggestedEnd.setDate(suggestedEnd.getDate() + Math.ceil(durationDays) - 1);
    if (suggestedEnd > deadline) {
      suggestedEnd = new Date(deadline);
    }
    if (suggestedEnd >= suggestedStart) {
      return { start: suggestedStart, end: suggestedEnd, gapFound: true };
    }
  }

  // Check gaps between tasks
  for (var i = 1; i < occupied.length; i++) {
    var prevEnd = occupied[i-1].end;
    var nextStart = occupied[i].start;
    cursor = new Date(prevEnd);
    cursor.setDate(cursor.getDate() + 1);
    gapDays = Math.floor((nextStart - cursor) / (1000*60*60*24));
    if (gapDays >= durationDays && cursor >= earliestStart) {
      suggestedStart = new Date(cursor);
      suggestedEnd = new Date(suggestedStart);
      suggestedEnd.setDate(suggestedEnd.getDate() + Math.ceil(durationDays) - 1);
      if (suggestedEnd > deadline) {
        suggestedEnd = new Date(deadline);
      }
      if (suggestedEnd >= suggestedStart && suggestedStart <= deadline) {
        return { start: suggestedStart, end: suggestedEnd, gapFound: true };
      }
    }
  }

  // After last task
  var lastEnd = occupied[occupied.length - 1].end;
  cursor = new Date(lastEnd);
  cursor.setDate(cursor.getDate() + 1);
  if (cursor < earliestStart) cursor = new Date(earliestStart);

  suggestedStart = new Date(cursor);
  suggestedEnd = new Date(suggestedStart);
  suggestedEnd.setDate(suggestedEnd.getDate() + Math.ceil(durationDays) - 1);
  if (suggestedEnd > deadline) {
    suggestedEnd = new Date(deadline);
  }

  var ok = suggestedEnd >= suggestedStart && suggestedStart <= deadline;
  // If not ok, force schedule before deadline
  if (!ok && deadline) {
    suggestedEnd = new Date(deadline);
    suggestedStart = new Date(deadline);
    suggestedStart.setDate(suggestedStart.getDate() - Math.ceil(durationDays) + 1);
    if (suggestedStart < earliestStart) suggestedStart = new Date(earliestStart);
    ok = suggestedEnd >= suggestedStart;
  }

  return { start: suggestedStart, end: suggestedEnd, gapFound: ok };
}

function submitTask() {
  if (!STATE.isAdmin) {
    showToast('请先以管理员身份登录', 'error');
    return;
  }

  var personName = document.getElementById('taskPerson').value;
  var taskName = document.getElementById('taskName').value.trim();
  var taskDesc = document.getElementById('taskDesc').value.trim();
  var priority = document.getElementById('taskPriority').value;
  var duration = parseFloat(document.getElementById('taskDuration').value);
  var deadline = document.getElementById('taskDeadline').value;

  if (!personName) { showToast('请选择执行人', 'error'); return; }
  if (!taskName) { showToast('请输入任务名称', 'error'); return; }
  if (!duration || duration < 0.5) { showToast('请输入有效工时（至少0.5天）', 'error'); return; }
  if (!deadline) { showToast('请选择截止日期', 'error'); return; }

  // Calculate schedule
  var result = calculateAutoSchedule(personName, duration, deadline, priority);

  if (!result.gapFound) {
    showToast('无法在截止日期前安排该任务，请调整工时或截止日期', 'warning');
    return;
  }

  // Show result preview
  var resultEl = document.getElementById('autoScheduleResult');
  resultEl.style.display = 'block';
  resultEl.innerHTML =
    '<div style="font-weight:600;margin-bottom:6px;color:var(--primary);">&#10003; 自动排期结果</div>' +
    '<div>执行人: <strong>' + personName + '</strong></div>' +
    '<div>任务: <strong>' + taskName + '</strong></div>' +
    '<div>优先级: <strong>' + priority + '</strong></div>' +
    '<div>排期: <strong>' + formatDate(result.start) + '</strong> 至 <strong>' + formatDate(result.end) + '</strong> (共' + duration + '天)</div>';

  // Create new record
  var newRecord = {
    title: taskDesc ? '[' + priority + '] ' + taskDesc : '[' + priority + '] ' + taskName,
    progress: '未启动',
    testDate: '',
    freezeDate: '',
    versionDate: '',
    onlineDate: null,
    startDate: formatDate(result.start),
    endDate: formatDate(result.end),
    assignee: [{ id: '', name: personName }],
    region: [],
    id: 'new_' + Date.now()
  };

  APP_DATA.records.push(newRecord);

  // Re-render
  renderStats();
  renderView();
  showToast('任务已添加并自动排期！', 'success');

  // Auto close after 1.5s
  setTimeout(function() {
    closeModal('taskModal');
  }, 1500);
}

// ======================== STATISTICS ========================
function renderStats() {
  var records = APP_DATA.records;
  var inProgress = records.filter(function(r) { return r.progress === '进行中'; }).length;
  var pending = records.filter(function(r) { return r.progress === '未启动'; }).length;
  var review = records.filter(function(r) { return r.progress === 'QA验收中'; }).length;
  var completed = records.filter(function(r) { return r.progress === '已完成'; }).length;
  var peopleCount = getAllPeople().length;

  var html = '';
  var cards = [
    { label: '总任务数', value: records.length, cls: 'primary' },
    { label: '进行中', value: inProgress, cls: 'primary' },
    { label: '未启动', value: pending, cls: 'warning' },
    { label: 'QA验收中', value: review, cls: 'primary' },
    { label: '涉及人员', value: peopleCount, cls: 'success' }
  ];
  cards.forEach(function(c) {
    html += '<div class="stat-card"><div class="label">' + c.label +
            '</div><div class="value ' + c.cls + '">' + c.value + '</div></div>';
  });
  document.getElementById('statsRow').innerHTML = html;
}

// ======================== FILTERS ========================
function getFilteredRecords() {
  var region = STATE.filterRegion;
  var status = STATE.filterStatus;
  var person = STATE.filterPerson;

  var result = APP_DATA.records.filter(function(r) {
    if (region && r.region.indexOf(region) === -1) return false;
    if (status && r.progress !== status) return false;
    if (person && !r.assignee.some(function(a) { return a.name === person; })) return false;
    return true;
  });

  return result;
}

function applyFilters() {
  STATE.filterRegion = document.getElementById('filterRegion').value;
  STATE.filterStatus = document.getElementById('filterStatus').value;
  STATE.filterPerson = document.getElementById('filterPerson').value;
  renderView();
}

function refreshView() {
  renderStats();
  renderView();
}

// ======================== TAB SYSTEM ========================
document.getElementById('viewTabs').addEventListener('click', function(e) {
  var tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  tab.classList.add('active');
  STATE.currentView = tab.dataset.view;
  renderView();
});

// ======================== RENDER VIEW ========================
function renderView() {
  var filtered = getFilteredRecords();
  document.getElementById('resultCount').textContent = '共 ' + filtered.length + ' 条记录';

  var container = document.getElementById('viewContainer');

  if (STATE.currentView === 'all') {
    container.innerHTML = '';
    var ganttEl = document.createElement('div');
    ganttEl.id = 'ganttContainer';
    container.appendChild(ganttEl);
    var tableEl = document.createElement('div');
    tableEl.id = 'tableContainer';
    container.appendChild(tableEl);
    renderGantt(filtered);
    renderTable(filtered);
  } else if (STATE.currentView === 'gantt') {
    container.innerHTML = '<div id="ganttContainer"></div>';
    renderGantt(filtered);
  } else if (STATE.currentView === 'table') {
    container.innerHTML = '<div id="tableContainer"></div>';
    renderTable(filtered);
  }
}

// ======================== TABLE ========================
function renderTable(records) {
  var container = document.getElementById('tableContainer');
  if (!container) return;
  if (!records) records = getFilteredRecords();

  // Sort
  if (STATE.sortBy) {
    records = [].concat(records);
    records.sort(function(a,b) {
      var va = getSortValue(a, STATE.sortBy);
      var vb = getSortValue(b, STATE.sortBy);
      if (va < vb) return STATE.sortDir === 'asc' ? -1 : 1;
      if (va > vb) return STATE.sortDir === 'asc' ? 1 : -1;
      return 0;
    });
  }

  var html = '<div class="table-wrapper"><div class="table-scroll"><table><thead><tr>';
  var cols = [
    { key: 'title', label: '工作内容' },
    { key: 'region', label: '地区' },
    { key: 'progress', label: '进展' },
    { key: 'assignee', label: '执行人' },
    { key: 'startDate', label: '启动日期' },
    { key: 'endDate', label: '任务结束' },
    { key: 'versionDate', label: '版更时间' },
    { key: 'onlineDate', label: '上线时间' },
    { key: 'testDate', label: '最晚转测' }
  ];

  cols.forEach(function(col) {
    var sortIcon = '';
    if (STATE.sortBy === col.key) {
      sortIcon = '<span class="sort-icon ' + STATE.sortDir + '"></span>';
    }
    html += '<th onclick="sortTable(\'' + col.key + '\')">' + col.label + sortIcon + '</th>';
  });
  html += '</tr></thead><tbody>';

  records.forEach(function(r) {
    var regionHtml = (r.region || []).map(function(reg) {
      return '<span class="badge-region">' + reg + '</span>';
    }).join('');

    var progressCls = '';
    if (r.progress === '进行中') progressCls = 'badge-progress';
    else if (r.progress === '未启动') progressCls = 'badge-pending';
    else if (r.progress === 'QA验收中') progressCls = 'badge-review';

    var assigneeHtml = (r.assignee || []).map(function(a) {
      var color = getPersonColor(a.name);
      return '<span style="display:inline-flex;align-items:center;gap:4px;margin-right:6px;">' +
             '<span style="width:6px;height:6px;border-radius:50%;background:' + color + ';display:inline-block;"></span>' +
             a.name + '</span>';
    }).join('');

    var onlineVal = r.onlineDate ? r.onlineDate : '-';

    html += '<tr>' +
      '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;" title="' + escHtml(r.title) + '">' + escHtml(r.title) + '</td>' +
      '<td>' + regionHtml + '</td>' +
      '<td><span class="badge ' + progressCls + '">' + r.progress + '</span></td>' +
      '<td>' + assigneeHtml + '</td>' +
      '<td>' + (r.startDate || '-') + '</td>' +
      '<td>' + (r.endDate || '-') + '</td>' +
      '<td>' + (r.versionDate || '-') + '</td>' +
      '<td>' + onlineVal + '</td>' +
      '<td>' + (r.testDate || '-') + '</td>' +
      '</tr>';
  });

  html += '</tbody></table></div></div>';
  container.innerHTML = html;
}

function getSortValue(rec, key) {
  if (key === 'title') return rec.title || '';
  if (key === 'region') return (rec.region || []).join(',');
  if (key === 'progress') return rec.progress || '';
  if (key === 'assignee') return (rec.assignee || []).map(function(a) { return a.name; }).join(',');
  if (key === 'startDate') return rec.startDate || '';
  if (key === 'endDate') return rec.endDate || '';
  if (key === 'versionDate') return rec.versionDate || '';
  if (key === 'onlineDate') return rec.onlineDate || '';
  if (key === 'testDate') return rec.testDate || '';
  return '';
}

function sortTable(key) {
  if (STATE.sortBy === key) {
    STATE.sortDir = STATE.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    STATE.sortBy = key;
    STATE.sortDir = 'asc';
  }
  renderView();
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ======================== GANTT CHART ========================
function getDateRange(records) {
  var minDate = null, maxDate = null;
  records.forEach(function(r) {
    if (r.startDate) {
      var d = parseDate(r.startDate);
      if (d && (!minDate || d < minDate)) minDate = d;
    }
    if (r.endDate) {
      var d = parseDate(r.endDate);
      if (d && (!maxDate || d > maxDate)) maxDate = d;
    }
    // Also check version dates and online dates for milestones
    if (r.versionDate) {
      var d = parseDate(r.versionDate);
      if (d && (!maxDate || d > maxDate)) maxDate = d;
    }
    if (r.onlineDate) {
      var d = parseDate(r.onlineDate);
      if (d && (!maxDate || d > maxDate)) maxDate = d;
    }
  });
  if (!minDate) minDate = new Date(2026, 3, 1);
  if (!maxDate) maxDate = new Date(2026, 11, 31);
  // Add padding
  minDate.setDate(minDate.getDate() - 7);
  maxDate.setDate(maxDate.getDate() + 14);
  return { min: minDate, max: maxDate };
}

function getWeekStart(d) {
  var day = d.getDay();
  var diff = d.getDate() - day + (day === 0 ? -6 : 1);
  var ws = new Date(d);
  ws.setDate(diff);
  ws.setHours(0,0,0,0);
  return ws;
}

function getWeekNumber(d) {
  var ws = getWeekStart(d);
  var yearStart = new Date(d.getFullYear(), 0, 1);
  var diff = Math.floor((ws - yearStart) / (1000*60*60*24));
  return Math.ceil((diff + yearStart.getDay() + 1) / 7);
}

function getWeeksBetween(start, end) {
  var weeks = [];
  var cursor = getWeekStart(start);
  while (cursor <= end) {
    weeks.push(new Date(cursor));
    cursor.setDate(cursor.getDate() + 7);
  }
  return weeks;
}

function formatShortDate(d) {
  return (d.getMonth()+1) + '/' + d.getDate();
}

function dayOffset(startDate, targetDate) {
  return Math.floor((targetDate - startDate) / (1000*60*60*24));
}

function renderGantt(records) {
  var container = document.getElementById('ganttContainer');
  if (!container) return;
  if (!records) records = getFilteredRecords();

  var range = getDateRange(records);
  var weeks = getWeeksBetween(range.min, range.max);
  var totalDays = Math.floor((range.max - range.min) / (1000*60*60*24));
  if (totalDays < 1) totalDays = 1;

  var dayWidth = Math.max(800 / weeks.length, 80);
  var headerHeight = 42;

  // Group records by assignee
  var grouped = {};
  var assigneeOrder = [];
  records.forEach(function(r) {
    var assignees = r.assignee;
    if (!assignees || assignees.length === 0) {
      assignees = [{ id: '', name: '未分配' }];
    }
    assignees.forEach(function(a) {
      if (!grouped[a.name]) {
        grouped[a.name] = [];
        assigneeOrder.push(a.name);
      }
      grouped[a.name].push(r);
    });
  });

  var tooltip = document.getElementById('ganttTooltip');

      '<div class="tt-row"><span class="tt-label">进展:</span><span>' + record.progress + '</span></div>' +
      '<div class="tt-row"><span class="tt-label">执行人:</span><span>' +
      (record.assignee || []).map(function(a) { return a.name; }).join(', ') + '</span></div>' +
      '<div class="tt-row"><span class="tt-label">启动:</span><span>' + (record.startDate || '-') + '</span></div>' +
      '<div class="tt-row"><span class="tt-label">结束:</span><span>' + (record.endDate || '-') + '</span></div>' +
      '<div class="tt-row"><span class="tt-label">版更:</span><span>' + (record.versionDate || '-') + '</span></div>' +
      '<div class="tt-row"><span class="tt-label">上线:</span><span>' + (record.onlineDate || '-') + '</span></div>';

    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    var tx = e.clientX + 12;
    var ty = e.clientY + 12;
    var tw = tooltip.offsetWidth;
    var th = tooltip.offsetHeight;
    if (tx + tw > window.innerWidth - 10) tx = e.clientX - tw - 12;
    if (ty + th > window.innerHeight - 10) ty = e.clientY - th - 12;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  }

  function hideTooltip() {
    tooltip.style.display = 'none';
  }

  var html = '<div class="gantt-wrapper">' +
    '<div class="gantt-header-section">' +
    '<h3>&#128197; 项目甘特图</h3>' +
    '<span style="font-size:12px;color:var(--gray-5);">' +
    formatShortDate(range.min) + ' - ' + formatShortDate(range.max) + '  |  ' +
    records.length + ' 个任务</span></div>';

  html += '<div class="gantt-scroll" style="overflow-x:auto;">';
  html += '<div class="gantt-container" style="min-width:' + (weeks.length * dayWidth + 220) + 'px;">';

  // Week headers
  html += '<div class="gantt-week-labels" style="padding-left:220px;">';
  weeks.forEach(function(w) {
    var cls = 'gantt-week-label';
    var now = new Date();
    if (w.toDateString() === getWeekStart(now).toDateString()) cls += ' today';
    var wn = getWeekNumber(w);
    var endOfWeek = new Date(w);
    endOfWeek.setDate(endOfWeek.getDate() + 6);
    html += '<div class="' + cls + '" style="width:' + dayWidth + 'px;min-width:' + dayWidth + 'px;">' +
      'W' + wn + '<span class="week-range">' + formatShortDate(w) + '-' + formatShortDate(endOfWeek) + '</span></div>';
  });
  html += '</div>';

  // Rows
  assigneeOrder.forEach(function(personName) {
    var tasks = grouped[personName];
    var color = getPersonColor(personName);

    html += '<div class="gantt-row">';
    html += '<div class="gantt-row-label" style="border-left:3px solid ' + color + ';">' +
      '<span class="person-dot" style="background:' + color + ';"></span>' +
      escHtml(personName) +
      '<span style="font-size:10px;color:var(--gray-4);margin-left:auto;">' + tasks.length + '</span>' +
      '</div>';
    html += '<div class="gantt-row-bars" style="position:relative;height:36px;">';

    // Grid lines
    weeks.forEach(function(w, idx) {
      var left = idx * dayWidth;
      html += '<div class="gantt-grid-line' + (w.getDate() <= 7 ? ' month-line' : '') + '" style="left:' + left + 'px;"></div>';
    });

    // Bars
    tasks.forEach(function(r) {
      if (!r.startDate || !r.endDate) return;
      var startD = parseDate(r.startDate);
      var endD = parseDate(r.endDate);
      if (!startD || !endD) return;

      var left = dayOffset(range.min, startD) / totalDays * (weeks.length * dayWidth);
      var width = Math.max(dayOffset(startD, endD) / totalDays * (weeks.length * dayWidth), 6);
      // Clamp
      if (left < 0) { width += left; left = 0; }
      if (width < 4) width = 4;

      var barColor = color;
      var barOpacity = 0.85;
      if (r.progress === '未启动') barOpacity = 0.55;
      if (r.progress === 'QA验收中') barColor = '#5AC8FA';

      var shortTitle = r.title.length > 20 ? r.title.substring(0, 20) + '..' : r.title;
      var domain = r.region ? r.region.join('/') : '';

      html += '<div class="gantt-bar" style="left:' + left + 'px;width:' + width + 'px;' +
        'background:' + barColor + ';opacity:' + barOpacity + ';" ' +
        'onmouseenter="showGanttTooltip(event, \'' + r.id + '\')" ' +
        'onmousemove="moveGanttTooltip(event)" ' +
        'onmouseleave="hideGanttTooltip()">' +
        '<div class="bar-label">' + (width > 30 ? escHtml(shortTitle) : '') + '</div></div>';
    });

    // Milestones for this person's tasks
    tasks.forEach(function(r) {
      if (r.versionDate) {
        var vd = parseDate(r.versionDate);

          html += '<div class="gantt-milestone milestone-version" style="left:' + vleft + 'px;">' +
            '<div class="milestone-label">版更</div></div>';
        }
      }
      if (r.onlineDate) {
        var od = parseDate(r.onlineDate);
        if (od) {
          var oleft = dayOffset(range.min, od) / totalDays * (weeks.length * dayWidth);
          html += '<div class="gantt-milestone milestone-online" style="left:' + oleft + 'px;">' +
            '<div class="milestone-label">上线</div></div>';
        }
      }
    });

    html += '</div></div>';
  });

  html += '</div></div>';

  // Legend
  html += '<div class="gantt-legend">';
  html += '<span style="font-size:12px;color:var(--gray-5);font-weight:500;">图例:</span>';

  container.innerHTML = html;

  // Store tooltip functions globally
  window.showGanttTooltip = function(e, id) {
    var found = null;

    });
    if (!found) return;
    showTooltip(e, found);
  };

  window.moveGanttTooltip = function(e) {
    var tooltip = document.getElementById('ganttTooltip');
    if (tooltip.style.display !== 'block') return;
    var tx = e.clientX + 12;
    var ty = e.clientY + 12;
    var tw = tooltip.offsetWidth;
    var th = tooltip.offsetHeight;
    if (tx + tw > window.innerWidth - 10) tx = e.clientX - tw - 12;
    if (ty + th > window.innerHeight - 10) ty = e.clientY - th - 12;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  };

  window.hideGanttTooltip = function() {
    hideTooltip();
  };
}
